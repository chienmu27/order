<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>訂餐系統（填單 / 查詢 / 刪除 / 設定）</title>

  <style>
    :root {
      --primary: #4285f4;
      --danger: #dc3545;
      --bg: #f8f9fa;
      --card: #fff;
      --text: #333;
      --muted: #666;
      --border: #e5e7eb;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* 內容區 */
    .container {
      max-width: 1100px;
      margin: auto;
      padding: 18px 14px 60px;
    }

    /* 選單區 */
    .menu-bar {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      padding: 14px;
      margin-bottom: 18px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      gap: 10px;
      align-items: center;
      font-weight: 800;
      letter-spacing: 0.5px;
      font-size: 18px;
    }

    .brand .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--primary);
      display: inline-block;
    }

    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nav button {
      border: 1px solid var(--border);
      background: white;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: 0.2s;
    }

    .nav button:hover {
      border-color: #cfd6e3;
      transform: translateY(-1px);
    }

    .nav button.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .page {
      display: none;
    }
    .page.active {
      display: block;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      padding: 18px;
    }

    /* 填單框架設定 */
    .google-form-wrapper {
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
    }

    .form-frame {
      width: 100%;
      height: 1800px;
      border: none;
      border-radius: 12px;
      background: white;
      display: block;
    }

    @media (max-width: 768px) {
      .form-frame { height: 2500px; -webkit-overflow-scrolling: touch; }
    }

    /* 查詢頁樣式 */
    #queryPage h2 { color: #333; text-align: center; margin: 0 0 14px; }
    #queryPage .controls {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
      margin-bottom: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      align-items: center;
    }
    #queryPage label { font-weight: bold; margin-right: 5px; }
    #queryPage select {
      font-size: 16px;
      padding: 8px;
      width: 220px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
    }
    #queryPage table {
      border-collapse: collapse;
      width: 100%;
      background: #fff;
      margin-top: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      overflow: hidden;
      border-radius: 10px;
    }
    #queryPage th, #queryPage td {
      border: 1px solid #e5e5e5;
      padding: 10px;
      text-align: center;
      font-size: 15px;
    }
    #queryPage th { background-color: #f8f9fa; color: #555; }
    #queryPage tr:nth-child(even) { background-color: #fcfcfc; }
    #queryPage .total-row { font-weight: bold; background: #e9ecef !important; }

    /* 刪除頁樣式 */
    #deletePage .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    #deletePage .header-btns { display: flex; gap: 8px; }
    #deletePage .refresh-btn, #deletePage .del-selected-btn, #deletePage .del-all-btn { padding: 8px 12px; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 700; }
    #deletePage .refresh-btn { background: white; border: 1px solid #ddd; }
    #deletePage .del-selected-btn { background: #fff0f0; border: 1px solid #ffaaaa; color: var(--danger); }
    #deletePage .del-selected-btn:hover { background: #fee2e2; }
    #deletePage .del-all-btn { background: white; border: 1px solid var(--danger); color: var(--danger); }
    #deletePage .del-all-btn:hover { background: var(--danger); color: white; }
    #deletePage .table-container { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-x: auto; }
    #deletePage table { width: 100%; border-collapse: collapse; min-width: 720px; font-size: 14px; }
    #deletePage th, #deletePage td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
    #deletePage th { background: #f8f9fa; color: #666; font-weight: bold; }
    #deletePage .btn-del { background: #fff0f0; color: var(--danger); border: 1px solid #ffcccc; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-weight: 800; }
    
    input[type="checkbox"] { transform: scale(1.2); cursor: pointer; }

    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; display: none; justify-content: center; align-items: center; }
    #modalBox { background: #fff; padding: 25px; border-radius: 14px; width: 90%; max-width: 340px; text-align: center; border: 1px solid #eee; }
    #pwdInput { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    #btnConfirm { background: var(--primary); color: #fff; }
    #btnCancel { background: #eee; color: #333; }

    /* 設定頁樣式 */
    #settingsPage .settings-card { background: white; border-radius: 16px; padding: 20px; max-width: 380px; margin: auto; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #settingsPage .field { margin-bottom: 15px; }
    #settingsPage label { display: block; font-size: 14px; margin-bottom: 5px; color: #666; font-weight: bold; }
    #settingsPage input, #settingsPage select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    #settingsPage button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    #status { margin-top: 15px; text-align: center; font-weight: bold; }
  </style>
</head>

<body>

  <div class="container">
    <div class="menu-bar">
      <div class="brand">
        <span class="dot"></span>
        <span>訂餐系統</span>
      </div>
      <div class="nav">
        <button class="active" data-page="formPage">📝 填單</button>
        <button data-page="queryPage">🔎 查詢</button>
        <button data-page="deletePage">🗑️ 刪除</button>
        <button data-page="settingsPage">⚙️ 設定</button>
      </div>
    </div>

    <section id="formPage" class="page active">
      <div class="card google-form-wrapper">
        <iframe
          class="form-frame"
          src="https://docs.google.com/forms/d/e/1FAIpQLScooZ_B9Jm7a2-IsEfJhwhLR7hsLyy8knIU3TKuzM7pw_Z5RQ/viewform?usp=header"
          loading="lazy"
        >載入中…</iframe>
      </div>
    </section>

    <section id="queryPage" class="page">
      <div class="card">
        <h2 id="sheetTitle">訂單查詢系統</h2>
        <div class="controls">
          <div>
            <label>訂購人員：</label>
            <select id="buyerSelect"><option value="">--請選擇--</option></select>
          </div>
          <div>
            <label>訂單統計：</label>
            <select id="listSelect">
              <option value="">--請選擇--</option>
              <option value="list1">購買人 / 金額總計</option>
              <option value="list2">項目 / 訂購數量總計</option>
            </select>
          </div>
        </div>
        <table id="resultTable"><thead></thead><tbody></tbody></table>
      </div>
    </section>

    <section id="deletePage" class="page">
      <div class="card">
        <div class="header">
          <h3 style="margin:0;">📋 訂單管理清單</h3>
          <div class="header-btns">
            <button class="refresh-btn" onclick="fetchOrders()">🔄 重新整理</button>
            <button class="del-selected-btn" onclick="prepareDelete('selected')">🗑️ 刪除選取</button>
            <button class="del-all-btn" onclick="prepareDelete('all')">⚠️ 全部刪除</button>
          </div>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th style="width: 40px;"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th>
                <th>時間</th><th>訂餐人員</th><th>便當品項</th><th>數量</th><th>備註</th><th>操作</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="settingsPage" class="page">
      <div class="settings-card">
        <h3>訂餐日期與店家設定</h3>
        <div class="field">
          <label>訂餐日期</label>
          <input type="date" id="orderDate">
        </div>
        <div class="field">
          <label>店家選單</label>
          <select id="restaurant"><option>載入中...</option></select>
        </div>
        <hr style="border:0; border-top:1px solid #eee; margin: 20px 0;">
        <!-- 已移除帳號欄位 -->
        <div class="field">
          <label>管理密碼</label>
          <input type="password" id="pwd" placeholder="請輸入設定密碼">
        </div>
        <button onclick="sendData()" id="btn">送出設定</button>
        <div id="status"></div>
      </div>
    </section>
  </div>

  <div id="loadingOverlay"><div class="spinner"></div><div id="loadingText" style="margin-top:15px; color:#555;">正在處理中...</div></div>
  <div id="modalOverlay">
    <div id="modalBox">
      <h3 style="margin-top:0;">身分驗證</h3>
      <p id="modalDesc" style="color:#666; font-size:14px;">請輸入管理密碼</p>
      <input type="password" id="pwdInput" placeholder="請輸入密碼">
      <div class="modal-btns"><button id="btnCancel">取消</button><button id="btnConfirm">確認</button></div>
    </div>
  </div>

<script>
function setDefaultDate() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  document.getElementById('orderDate').value = `${yyyy}-${mm}-${dd}`;
}

(function initNav(){
  setDefaultDate();
  const navButtons = document.querySelectorAll(".nav button");
  const pages = document.querySelectorAll(".page");
  function showPage(id){
    pages.forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    navButtons.forEach(b => b.classList.remove("active"));
    document.querySelector(`.nav button[data-page="${id}"]`).classList.add("active");
    if(id === "deletePage") fetchOrders();
  }
  navButtons.forEach(btn => btn.addEventListener("click", () => showPage(btn.dataset.page)));
})();

function parseCSV(text) {
  const result = []; let cur = []; let curVal = ""; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i]; const next = text[i+1];
    if (inQuotes) {
      if (ch === '"' && next === '"') { curVal += '"'; i++; }
      else if (ch === '"') inQuotes = false;
      else curVal += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { cur.push(curVal); curVal = ""; }
      else if (ch === '\n') { cur.push(curVal); result.push(cur); cur = []; curVal = ""; }
      else if (ch !== '\r') curVal += ch;
    }
  }
  if (curVal !== "" || cur.length > 0) { cur.push(curVal); result.push(cur); }
  return result;
}

const queryCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQISD3cRAvsldviyxyfFi7xQVE12l900EW1yu8_OXOS-uDIr12XAr8zISHsZpJzTBLe_j4kuHWwgdG6/pub?gid=1785595426&single=true&output=csv";
let queryHeader = []; let queryDataRows = [];
async function loadQueryCSV() {
  try {
    const res = await fetch(queryCsvUrl); const text = await res.text(); const parsed = parseCSV(text);
    const rows = parsed.filter(r => r.some(c => (c ?? "").trim() !== ""));
    if (rows.length > 1) {
      document.getElementById("sheetTitle").innerText = (rows[0][2] || "訂單查詢") + " (" + (rows[0][0] || "") + ")";
      queryHeader = rows[1]; queryDataRows = rows.slice(2); buildBuyerDropdown();
    }
  } catch (e) { console.error("讀取查詢CSV失敗"); }
}

function buildBuyerDropdown() {
  const buyerIdx = queryHeader.indexOf("購買人");
  const set = new Set();
  queryDataRows.forEach(r => { const val = (r[buyerIdx] ?? "").trim(); if (val && val !== "購買人") set.add(val); });
  const select = document.getElementById("buyerSelect");
  select.innerHTML = '<option value="">--請選擇--</option><option value="ALL">全部訂單清單</option>';
  [...set].sort().forEach(v => { const op = document.createElement("option"); op.value = v; op.textContent = v; select.appendChild(op); });
}

function renderNormalTable(buyer) {
  const tbody = document.querySelector("#resultTable tbody");
  const thead = document.querySelector("#resultTable thead");
  thead.innerHTML = `<tr><th>購買人</th><th>項目</th><th>單價</th><th>加飯</th><th>加料</th><th>數量</th><th>小計</th></tr>`;
  tbody.innerHTML = "";
  const idx = { item: queryHeader.indexOf("項目"), price: queryHeader.indexOf("單價"), rice: queryHeader.indexOf("加飯"), add: queryHeader.indexOf("加料"), qty: queryHeader.indexOf("數量"), sub: queryHeader.indexOf("小計"), user: queryHeader.indexOf("購買人") };
  let filtered = buyer === "ALL" ? queryDataRows : queryDataRows.filter(r => (r[idx.user] ?? "").trim() === buyer);
  let total = 0;
  filtered.forEach(r => {
    const s = Number(r[idx.sub]) || 0; total += s;
    tbody.innerHTML += `<tr><td>${r[idx.user]||""}</td><td>${r[idx.item]||""}</td><td>${r[idx.price]||""}</td><td>${r[idx.rice]||""}</td><td>${r[idx.add]||""}</td><td>${r[idx.qty]||""}</td><td>${s}</td></tr>`;
  });
  if(buyer !== "ALL") tbody.innerHTML += `<tr class="total-row"><td colspan="6">合計</td><td>${total}</td></tr>`;
}

document.getElementById("buyerSelect").addEventListener("change", e => { if(e.target.value) renderNormalTable(e.target.value); });
loadQueryCSV();

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzh9zPFHf6vmhQQR7LrHlokXkPPKnQ2u9ZiqnL6x9kMe4YSaMkrLJJOsqU72OXOIwwo/exec";
let targetRow = null;

function toggleSelectAll(source) {
  const checkboxes = document.getElementsByClassName('row-checkbox');
  for (let i = 0; i < checkboxes.length; i++) {
    checkboxes[i].checked = source.checked;
  }
}

async function fetchOrders() {
  showLoading(true, "載入中...");
  document.getElementById('selectAll').checked = false;
  try {
    const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQISD3cRAvsldviyxyfFi7xQVE12l900EW1yu8_OXOS-uDIr12XAr8zISHsZpJzTBLe_j4kuHWwgdG6/pub?gid=1605656850&single=true&output=csv&t="+Date.now());
    const text = await res.text(); const rows = parseCSV(text);
    const tbody = document.getElementById('tableBody');
    if (rows.length < 2) { tbody.innerHTML = '<tr><td colspan="7">尚無訂單</td></tr>'; return; }
    tbody.innerHTML = rows.slice(1).map((row, i) => `
      <tr>
        <td><input type="checkbox" class="row-checkbox" value="${i+2}"></td>
        <td>${row[0]}</td>
        <td>${row[1]}</td>
        <td>${row[2]}</td>
        <td>${row[3]}</td>
        <td>${row[4]||""}</td>
        <td><button class="btn-del" onclick="prepareDelete(${i+2})">刪除</button></td>
      </tr>`).join('');
  } catch (e) { alert("讀取失敗"); } finally { showLoading(false); }
}

function prepareDelete(type) {
  if (type === 'selected') {
    const checked = document.querySelectorAll('.row-checkbox:checked');
    if (checked.length === 0) { alert("請先勾選要刪除的訂單"); return; }
    targetRow = Array.from(checked).map(cb => parseInt(cb.value));
    document.getElementById('modalDesc').innerText = `您選取了 ${targetRow.length} 筆訂單，請輸入密碼確認刪除`;
  } else if (type === 'all') {
    targetRow = 'all';
    document.getElementById('modalDesc').innerText = "確定要刪除所有訂單嗎？請輸入管理密碼";
  } else {
    targetRow = type;
    document.getElementById('modalDesc').innerText = "請輸入管理密碼確認刪除該筆訂單";
  }
  document.getElementById('modalOverlay').style.display = 'flex';
}

document.getElementById('btnCancel').onclick = () => {
  document.getElementById('modalOverlay').style.display = 'none';
  document.getElementById('pwdInput').value = '';
}

document.getElementById('btnConfirm').onclick = async () => {
  const pwd = document.getElementById('pwdInput').value; 
  if(!pwd) { alert("請輸入密碼"); return; }
  document.getElementById('modalOverlay').style.display = 'none';
  document.getElementById('pwdInput').value = '';
  showLoading(true, "處理中...");
  try {
    const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ row: targetRow, password: pwd }) });
    const result = await res.json(); 
    alert(result.message); 
    if(result.status === 'success') fetchOrders();
  } catch(e) { alert("執行失敗"); } finally { showLoading(false); }
};

function showLoading(show, text) { 
  document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; 
  if(text) document.getElementById('loadingText').innerText = text; 
}

/* 4. 修改設定功能：僅使用密碼驗證 */
const setUrl = 'https://script.google.com/macros/s/AKfycbxsG1au7MoB7WKs397tM0ZQciSZkdyM_U5Bgb7FBTzOn9OVLFi6_94waAz3HEddovIY/exec';
async function loadSettingsOptions() {
  try {
    const res = await fetch(setUrl + "?action=getOptions");
    const data = await res.json();
    const select = document.getElementById('restaurant'); select.innerHTML = '';
    data.forEach(item => { if(item) { let opt = document.createElement('option'); opt.value = opt.innerHTML = item; select.appendChild(opt); } });
  } catch(e) { console.error("載入設定選項失敗"); }
}
loadSettingsOptions();

function sendData() {
  const btn = document.getElementById('btn'); 
  const status = document.getElementById('status');
  const d = document.getElementById('orderDate').value; 
  const s = document.getElementById('restaurant').value;
  const p = document.getElementById('pwd').value; // 只獲取密碼

  if (!p || !d || !s) { alert("請填寫完整（日期、店家及密碼）"); return; }
  
  btn.disabled = true; 
  status.innerHTML = "驗證並處理中...";
  status.style.color = "#666";

  // 修改後的 API 請求路徑，移除了 acc
  fetch(`${setUrl}?action=submit&date=${d}&store=${s}&pwd=${p}`)
    .then(r => r.text())
    .then(t => { 
      status.innerHTML = t; 
      // 根據回傳文字判斷顏色，若包含成功則綠色，否則（如失敗、錯誤）則紅色
      if (t.includes("成功")) {
        status.style.color = "green";
        document.getElementById('pwd').value = ""; // 成功後清空密碼欄位
      } else {
        status.style.color = "red";
      }
      btn.disabled = false; 
    })
    .catch(err => {
      status.innerHTML = "網路錯誤或連線失敗";
      status.style.color = "red";
      btn.disabled = false;
    });
}
</script>
</body>
</html>
