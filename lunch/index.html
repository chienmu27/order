<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>訂餐系統（填單 / 查詢 / 刪除 / 設定）</title>

  <style>
    :root {
      --primary: #4285f4;
      --danger: #dc3545;
      --bg: #f8f9fa;
      --card: #fff;
      --text: #333;
      --muted: #666;
      --border: #e5e7eb;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 18px 14px 60px;
    }

    .menu-bar {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      padding: 14px;
      margin-bottom: 18px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      gap: 10px;
      align-items: center;
      font-weight: 800;
      letter-spacing: 0.5px;
      font-size: 18px;
    }

    .brand .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--primary);
      display: inline-block;
    }

    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nav button {
      border: 1px solid var(--border);
      background: white;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: 0.2s;
    }

    .nav button.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .page { display: none; }
    .page.active { display: block; }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      padding: 18px;
    }

    /* 填單框架 */
    .form-frame {
      width: 100%;
      height: 1800px;
      border: none;
      border-radius: 12px;
    }

    @media (max-width: 768px) {
      .form-frame { height: 2500px; }
    }

    /* 查詢頁表格 */
    #queryPage table, #deletePage table {
      border-collapse: collapse;
      width: 100%;
      background: #fff;
      margin-top: 15px;
      border-radius: 10px;
      overflow: hidden;
    }
    #queryPage th, #queryPage td, #deletePage th, #deletePage td {
      border: 1px solid #e5e5e5;
      padding: 10px;
      text-align: center;
    }
    #queryPage th, #deletePage th { background-color: #f8f9fa; }

    /* 刪除頁樣式 */
    .del-selected-btn { background: #fff0f0; border: 1px solid #ffaaaa; color: var(--danger); padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .btn-del { background: #fff0f0; color: var(--danger); border: 1px solid #ffcccc; padding: 6px 12px; border-radius: 10px; cursor: pointer; }

    /* 設定頁樣式 */
    #settingsPage .settings-card { background: white; border-radius: 16px; padding: 25px; max-width: 400px; margin: auto; border: 1px solid #eee; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    #settingsPage .field { margin-bottom: 15px; }
    #settingsPage label { display: block; font-size: 14px; margin-bottom: 8px; color: #333; font-weight: bold; }
    #settingsPage input, #settingsPage select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
    #settingsPage button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
    #status { margin-top: 15px; text-align: center; font-weight: bold; font-size: 16px; }

    /* Loading Overlay */
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Modal */
    #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; display: none; justify-content: center; align-items: center; }
    #modalBox { background: #fff; padding: 25px; border-radius: 14px; width: 90%; max-width: 340px; text-align: center; }
  </style>
</head>

<body>

  <div class="container">
    <div class="menu-bar">
      <div class="brand"><span class="dot"></span><span>訂餐系統</span></div>
      <div class="nav">
        <button class="active" data-page="formPage">📝 填單</button>
        <button data-page="queryPage">🔎 查詢</button>
        <button data-page="deletePage">🗑️ 刪除</button>
        <button data-page="settingsPage">⚙️ 設定</button>
      </div>
    </div>

    <!-- 填單頁 -->
    <section id="formPage" class="page active">
      <div class="card"><iframe class="form-frame" src="https://docs.google.com/forms/d/e/1FAIpQLScooZ_B9Jm7a2-IsEfJhwhLR7hsLyy8knIU3TKuzM7pw_Z5RQ/viewform?usp=header" loading="lazy">載入中…</iframe></div>
    </section>

    <!-- 查詢頁 -->
    <section id="queryPage" class="page">
      <div class="card">
        <h2 id="sheetTitle" style="text-align:center;">訂單查詢系統</h2>
        <div style="display:flex; gap:15px; flex-wrap:wrap; margin-bottom:20px;">
          <div><label>訂購人員：</label><select id="buyerSelect"><option value="">--請選擇--</option></select></div>
        </div>
        <table id="resultTable"><thead></thead><tbody></tbody></table>
      </div>
    </section>

    <!-- 刪除頁 -->
    <section id="deletePage" class="page">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <h3 style="margin:0;">📋 訂單管理</h3>
          <div>
            <button onclick="fetchOrders()" style="padding:8px 12px; border-radius:10px; cursor:pointer; background:white; border:1px solid #ddd;">🔄 刷新</button>
            <button class="del-selected-btn" onclick="prepareDelete('selected')">🗑️ 刪除選取</button>
          </div>
        </div>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr><th><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th><th>時間</th><th>人員</th><th>品項</th><th>數量</th><th>備註</th><th>操作</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- 設定頁 -->
    <section id="settingsPage" class="page">
      <div class="settings-card">
        <h3 style="margin-top:0; text-align:center;">訂餐日期與店家設定</h3>
        <div class="field">
          <label>訂餐日期</label>
          <input type="date" id="orderDate">
        </div>
        <div class="field">
          <label>店家選單</label>
          <select id="restaurant"><option>載入中...</option></select>
        </div>
        <hr style="border:0; border-top:1px solid #eee; margin: 20px 0;">
        <div class="field">
          <label>管理密碼</label>
          <input type="password" id="pwd" placeholder="請輸入設定密碼">
        </div>
        <button onclick="sendData()" id="btn">送出設定</button>
        <div id="status"></div>
      </div>
    </section>
  </div>

  <div id="loadingOverlay"><div class="spinner"></div><div id="loadingText" style="margin-top:15px;">處理中...</div></div>
  
  <div id="modalOverlay">
    <div id="modalBox">
      <h3>身分驗證</h3>
      <p id="modalDesc">請輸入管理密碼</p>
      <input type="password" id="pwdInput" style="width:100%; padding:10px; margin:15px 0; border:1px solid #ddd; border-radius:10px; box-sizing:border-box;">
      <div style="display:flex; gap:10px;">
        <button id="btnCancel" style="flex:1; padding:10px; border-radius:10px; border:none; cursor:pointer;">取消</button>
        <button id="btnConfirm" style="flex:1; padding:10px; border-radius:10px; border:none; cursor:pointer; background:var(--primary); color:white;">確認</button>
      </div>
    </div>
  </div>

<script>
/* 預設日期 */
function setDefaultDate() {
  const today = new Date();
  document.getElementById('orderDate').value = today.toISOString().split('T')[0];
}

/* 分頁切換 */
(function initNav(){
  setDefaultDate();
  const navButtons = document.querySelectorAll(".nav button");
  const pages = document.querySelectorAll(".page");
  navButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.page;
      pages.forEach(p => p.classList.toggle("active", p.id === id));
      navButtons.forEach(b => b.classList.toggle("active", b === btn));
      if(id === "deletePage") fetchOrders();
    });
  });
})();

/* 查詢/解析功能 (簡化) */
function parseCSV(text) {
  const rows = []; let cur = []; let val = ""; let inQuotes = false;
  for(let i=0; i<text.length; i++) {
    const c = text[i];
    if(inQuotes) { if(c === '"' && text[i+1] === '"') { val += '"'; i++; } else if(c === '"') inQuotes = false; else val += c; }
    else { if(c === '"') inQuotes = true; else if(c === ',') { cur.push(val); val = ""; } else if(c === '\n') { cur.push(val); rows.push(cur); cur = []; val = ""; } else if(c !== '\r') val += c; }
  }
  if(val || cur.length) { cur.push(val); rows.push(cur); }
  return rows;
}

/* 刪除邏輯 */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzh9zPFHf6vmhQQR7LrHlokXkPPKnQ2u9ZiqnL6x9kMe4YSaMkrLJJOsqU72OXOIwwo/exec";
let targetRow = null;

async function fetchOrders() {
  document.getElementById('loadingOverlay').style.display = 'flex';
  try {
    const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQISD3cRAvsldviyxyfFi7xQVE12l900EW1yu8_OXOS-uDIr12XAr8zISHsZpJzTBLe_j4kuHWwgdG6/pub?gid=1605656850&single=true&output=csv&t="+Date.now());
    const text = await res.text(); const rows = parseCSV(text);
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = rows.slice(1).map((r, i) => `<tr><td><input type="checkbox" class="row-checkbox" value="${i+2}"></td><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]||""}</td><td><button class="btn-del" onclick="prepareDelete(${i+2})">刪除</button></td></tr>`).join('');
  } catch(e) { alert("載入失敗"); }
  document.getElementById('loadingOverlay').style.display = 'none';
}

function toggleSelectAll(source) {
  document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = source.checked);
}

function prepareDelete(type) {
  if(type === 'selected') {
    const checked = document.querySelectorAll('.row-checkbox:checked');
    if(!checked.length) { alert("請先勾選"); return; }
    targetRow = Array.from(checked).map(c => parseInt(c.value));
  } else { targetRow = type; }
  document.getElementById('modalOverlay').style.display = 'flex';
}

document.getElementById('btnCancel').onclick = () => document.getElementById('modalOverlay').style.display = 'none';
document.getElementById('btnConfirm').onclick = async () => {
  const pwd = document.getElementById('pwdInput').value;
  if(!pwd) return;
  document.getElementById('modalOverlay').style.display = 'none';
  document.getElementById('loadingOverlay').style.display = 'flex';
  try {
    const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ row: targetRow, password: pwd }) });
    const result = await res.json();
    alert(result.message);
    if(result.status === 'success') fetchOrders();
  } catch(e) { alert("執行失敗"); }
  document.getElementById('loadingOverlay').style.display = 'none';
};

/* 設定功能修改點 */
const setUrl = 'https://script.google.com/macros/s/AKfycbxsG1au7MoB7WKs397tM0ZQciSZkdyM_U5Bgb7FBTzOn9OVLFi6_94waAz3HEddovIY/exec';

async function loadSettingsOptions() {
  try {
    const res = await fetch(setUrl + "?action=getOptions");
    const data = await res.json();
    const select = document.getElementById('restaurant');
    select.innerHTML = data.filter(i => i).map(i => `<option value="${i}">${i}</option>`).join('');
  } catch(e) { console.error("選單載入失敗"); }
}
loadSettingsOptions();

function sendData() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  const d = document.getElementById('orderDate').value;
  const s = document.getElementById('restaurant').value;
  const p = document.getElementById('pwd').value;

  if (!p || !d || !s) { alert("請填寫完整"); return; }
  
  btn.disabled = true;
  status.innerHTML = "正在驗證密碼並送出...";
  status.style.color = "#666";

  // 修改：傳送 acc= 空值，確保後端接收參數時不會因為找不到 acc 而判斷錯誤
  fetch(`${setUrl}?action=submit&date=${d}&store=${s}&acc=&pwd=${p}`)
    .then(r => r.text())
    .then(t => {
      status.innerHTML = t;
      // 判斷回傳字串是否包含成功字樣
      if (t.includes("成功")) {
        status.style.color = "green";
        document.getElementById('pwd').value = ""; 
      } else {
        status.style.color = "red";
      }
      btn.disabled = false;
    })
    .catch(err => {
      status.innerHTML = "連線失敗，請檢查網路";
      status.style.color = "red";
      btn.disabled = false;
    });
}
</script>
</body>
</html>
