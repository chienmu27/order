<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>訂餐系統（填單 / 查詢 / 刪除 / 設定）</title>
  <style>
    :root { --primary: #4285f4; --danger: #dc3545; --bg: #f8f9fa; --card: #fff; --text: #333; --muted: #666; --border: #e5e7eb; --notice-bg: #fffbe6; --notice-border: #ffe58f; }
    body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); }
    #lineWarning { display: none; background: #fff3cd; color: #856404; padding: 12px; text-align: center; font-size: 14px; border-bottom: 2px solid #ffeeba; font-weight: bold; }
    .container { max-width: 1100px; margin: auto; padding: 18px 14px 60px; }
    .menu-bar { background: white; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); padding: 14px; margin-bottom: 18px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; }
    .brand { display: flex; gap: 10px; align-items: center; font-weight: 800; font-size: 18px; }
    .brand .dot { width: 10px; height: 10px; border-radius: 999px; background: var(--primary); display: inline-block; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav button { border: 1px solid var(--border); background: white; padding: 9px 12px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.2s; }
    .nav button:hover { border-color: #cfd6e3; transform: translateY(-1px); }
    .nav button.active { background: var(--primary); border-color: var(--primary); color: white; }
    .page { display: none; }
    .page.active { display: block; }
    .card { background: white; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); padding: 18px; }
    .form-notice { background: #e1f5fe; padding: 12px; text-align: center; font-size: 14px; color: #01579b; border-radius: 12px 12px 0 0; border-bottom: 1px solid #b3e5fc; }
    .external-btn { display: inline-block; background: var(--primary); color: white !important; padding: 6px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-top: 5px; border: none; cursor: pointer; font-size: 13px; }
    .form-frame { width: 100%; height: 1800px; border: none; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
    @media (max-width: 768px) { .form-frame { height: 2500px; } }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .header-btns { display: flex; gap: 8px; }
    .refresh-btn { background: white; border: 1px solid #ddd; padding: 8px 12px; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 700; }
    .del-selected-btn { background: #fff0f0; border: 1px solid #ffaaaa; color: var(--danger); padding: 8px 12px; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 700; }
    .del-all-btn { background: white; border: 1px solid var(--danger); color: var(--danger); padding: 8px 12px; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 700; }
    .controls { background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 10px 25px; align-items: center; }
    .controls label { font-weight: bold; font-size: 14px; }
    .controls select { font-size: 16px; padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: white; min-width: 200px; }
    .table-container { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 720px; font-size: 14px; }
    th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; border-right: 1px solid #f9f9f9; }
    th { background: #f8f9fa; color: #666; font-weight: bold; }
    .total-row { font-weight: bold; background: #e9ecef !important; }
    .btn-del { background: #fff0f0; color: var(--danger); border: 1px solid #ffcccc; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-weight: 800; }
    input[type="checkbox"] { transform: scale(1.2); cursor: pointer; }
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; display: none; justify-content: center; align-items: center; }
    #modalBox { background: #fff; padding: 25px; border-radius: 14px; width: 90%; max-width: 340px; text-align: center; }
    #pwdInput { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .settings-card { background: white; border-radius: 16px; padding: 20px; max-width: 380px; margin: auto; border: 1px solid #eee; }
    .field { margin-bottom: 15px; }
    .field label { display: block; font-size: 14px; margin-bottom: 5px; color: #666; font-weight: bold; }
    .field input, .field select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    #btnSave { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .status-btns { display: flex; gap: 8px; margin-top: 8px; }
    .status-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.3s; }
    .status-btn.open { background: #e6f4ea; color: #1e7e34; border-color: #c3e6cb; }
    .status-btn.close { background: #fdf2f2; color: #dc3545; border-color: #f5c6cb; }
    .status-btn:hover { opacity: 0.8; }
  </style>
</head>

<body>
  <div id="lineWarning">⚠️ 偵測到您正在使用 LINE 開啟。建議點擊「用瀏覽器開啟」。</div>
  <div class="container">
    <div class="menu-bar">
      <div class="brand"><span class="dot"></span><span>訂餐系統</span></div>
      <div class="nav">
        <button class="active" data-page="formPage">📝 填單</button>
        <button data-page="queryPage">🔎 查詢</button>
        <button data-page="deletePage">🗑️ 刪除</button>
        <button data-page="settingsPage">⚙️ 設定</button>
      </div>
    </div>

    <section id="formPage" class="page active">
      <div class="card" style="padding:0;">
        <div class="form-notice"><b>無法登入 Google？</b><br><button class="external-btn" onclick="handleExternalLink()">🚀 使用瀏覽器開啟</button></div>
        <iframe class="form-frame" src="https://docs.google.com/forms/d/e/1FAIpQLScooZ_B9Jm7a2-IsEfJhwhLR7hsLyy8knIU3TKuzM7pw_Z5RQ/viewform?usp=header"></iframe>
      </div>
    </section>

    <section id="queryPage" class="page">
      <div class="card">
        <div class="header">
          <h3 id="sheetTitle" style="margin:0;">訂單查詢系統</h3>
          <button class="refresh-btn" onclick="loadQueryData(true)">🔄 重新整理</button>
        </div>
        <div class="controls">
          <div><label>訂購人員：</label><select id="buyerSelect"><option value="">--請選擇--</option></select></div>
          <div><label>訂單統計：</label><select id="listSelect"><option value="">--請選擇--</option><option value="list1">購買人 / 金額總計</option><option value="list2">項目 / 訂購數量總計</option></select></div>
        </div>
        <div class="table-container"><table id="resultTable"><thead></thead><tbody></tbody></table></div>
      </div>
    </section>

    <section id="deletePage" class="page">
      <div class="card">
        <div class="header">
          <h3 style="margin:0;">📋 訂單管理清單</h3>
          <div class="header-btns">
            <button class="refresh-btn" onclick="fetchOrders(true)">🔄 重新整理</button>
            <button class="del-selected-btn" onclick="prepareDelete('selected')">🗑️ 刪除選取</button>
            <button class="del-all-btn" onclick="prepareDelete('all')">⚠️ 全部刪除</button>
          </div>
        </div>
        <div class="table-container">
          <table>
            <thead><tr><th style="width: 40px;"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th><th>時間</th><th>訂餐人員</th><th>便當品項</th><th>數量</th><th>備註</th><th>操作</th></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section id="settingsPage" class="page">
      <div class="settings-card">
        <h3>訂餐管理系統</h3>
        <div class="field"><label>訂餐日期</label><input type="date" id="orderDate"></div>
        <div class="field"><label>店家選單</label><select id="restaurant"><option>載入中...</option></select></div>
        <div class="field">
          <label>表單狀態：<span id="formStatusLabel" style="color:var(--primary);">載入中...</span></label>
          <div class="status-btns">
            <button class="status-btn open" onclick="prepareStatusChange(true)">🟢 開啟回應</button>
            <button class="status-btn close" onclick="prepareStatusChange(false)">🔴 停止回應</button>
          </div>
        </div>
        <hr style="border:0; border-top:1px solid #eee; margin: 20px 0;">
        <div class="field"><label>帳號</label><input type="text" id="acc"></div>
        <div class="field"><label>密碼</label><input type="password" id="pwd"></div>
        <button onclick="sendData()" id="btnSave">送出設定</button>
        <div id="status"></div>
      </div>
    </section>
  </div>

  <div id="loadingOverlay"><div class="spinner"></div><div id="loadingText">處理中...</div></div>
  <div id="modalOverlay">
    <div id="modalBox">
      <h3 style="margin-top:0;">身分驗證</h3><p id="modalDesc">請輸入管理密碼</p><input type="password" id="pwdInput">
      <div class="modal-btns"><button id="btnCancel" style="background:#eee;">取消</button><button id="btnConfirm" style="background:var(--primary); color:white;">確認</button></div>
    </div>
  </div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzh9zPFHf6vmhQQR7LrHlokXkPPKnQ2u9ZiqnL6x9kMe4YSaMkrLJJOsqU72OXOIwwo/exec"; 
const rawFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLScooZ_B9Jm7a2-IsEfJhwhLR7hsLyy8knIU3TKuzM7pw_Z5RQ/viewform";

let queryHeader = [], queryDataRows = [], statusToChange = null, targetRowsToDelete = null;

function handleExternalLink() {
  if (/Android/i.test(navigator.userAgent)) window.location.href = `intent://${rawFormUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`;
  else window.location.href = rawFormUrl + "?openExternalBrowser=1";
}

function setDefaultDate() { document.getElementById('orderDate').value = new Date().toISOString().split('T')[0]; }

(function initNav(){
  setDefaultDate();
  const navButtons = document.querySelectorAll(".nav button"), pages = document.querySelectorAll(".page");
  navButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.page;
      pages.forEach(p => p.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      navButtons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      if(id === "deletePage") fetchOrders(true);
      if(id === "queryPage") loadQueryData(true);
      if(id === "settingsPage") { loadSettingsOptions(); fetchFormStatus(); }
    });
  });
})();

async function loadQueryData(force = false) {
  if (queryDataRows.length > 0 && !force) return;
  showLoading(true, "讀取最新查詢資料...");
  try {
    const res = await fetch(`${GAS_URL}?action=getOrders&sheetName=訂餐&t=${Date.now()}`);
    const result = await res.json();
    if (result.status === "success") {
      const rows = result.data;
      if (rows.length > 1) {
        const titleInfo = rows[0];
        let d = new Date(titleInfo[0]);
        let displayDate = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        document.getElementById("sheetTitle").innerText = (titleInfo[2] || "訂單查詢") + " (" + displayDate + ")";
        queryHeader = rows[1]; queryDataRows = rows.slice(2);
        buildBuyerDropdown();
      }
    }
  } catch (e) { alert("讀取失敗"); } finally { showLoading(false); }
}

async function fetchOrders(force = false) {
  showLoading(true, "讀取清單...");
  try {
    const res = await fetch(`${GAS_URL}?action=getOrders&t=${Date.now()}`);
    const data = await res.json();
    if (data.status === "success") {
      const rows = data.data;
      document.getElementById('tableBody').innerHTML = rows.slice(1).map((row, i) => `
        <tr>
          <td><input type="checkbox" class="row-checkbox" value="${i+2}"></td>
          <td>${row[0] ? new Date(row[0]).toLocaleString('zh-TW', { hour12: true }) : ""}</td>
          <td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td><td>${row[5]||""}</td>
          <td><button class="btn-del" onclick="prepareDelete(${i+2})">刪除</button></td>
        </tr>`).join('');
    }
  } finally { showLoading(false); }
}

function buildBuyerDropdown() {
  const buyerIdx = queryHeader.indexOf("購買人");
  if (buyerIdx === -1) return;
  const set = new Set();
  queryDataRows.forEach(r => { if (r[buyerIdx]) set.add(r[buyerIdx].trim()); });
  const select = document.getElementById("buyerSelect");
  select.innerHTML = '<option value="">--請選擇--</option><option value="ALL">全部訂單清單</option>';
  [...set].sort().forEach(v => { const op = document.createElement("option"); op.value = op.textContent = v; select.appendChild(op); });
}

function renderNormalTable(buyer) {
  const thead = document.querySelector("#resultTable thead"), tbody = document.querySelector("#resultTable tbody");
  thead.innerHTML = `<tr><th>購買人</th><th>項目</th><th>單價</th><th>口味</th><th>備註</th><th>數量</th><th>小計</th></tr>`;
  const idx = { user: queryHeader.indexOf("購買人"), item: queryHeader.indexOf("項目"), price: queryHeader.indexOf("單價"), rice: queryHeader.indexOf("口味"), add: queryHeader.indexOf("備註"), qty: queryHeader.indexOf("數量"), sub: queryHeader.indexOf("小計") };
  let filtered = (buyer === "ALL") ? queryDataRows.filter(r => (r[idx.user]||"").trim() !== "") : queryDataRows.filter(r => (r[idx.user]||"").trim() === buyer);
  let total = 0;
  tbody.innerHTML = filtered.map(r => { 
    const s = Number(r[idx.sub]) || 0; total += s; 
    return `<tr><td>${r[idx.user]||""}</td><td>${r[idx.item]||""}</td><td>${r[idx.price]||""}</td><td>${r[idx.rice]||""}</td><td>${r[idx.add]||""}</td><td>${r[idx.qty]||""}</td><td>${s}</td></tr>`;
  }).join('');
  if (buyer !== "ALL") tbody.innerHTML += `<tr class="total-row"><td colspan="6">合計</td><td>${total}</td></tr>`;
}

document.getElementById("buyerSelect").addEventListener("change", (e) => { if (e.target.value) renderNormalTable(e.target.value); });

async function fetchFormStatus() {
  const res = await fetch(`${GAS_URL}?action=getFormStatus`);
  const data = await res.json();
  const label = document.getElementById('formStatusLabel');
  label.innerText = data.accepting ? "🟢 接受中" : "🔴 已停止";
}

function prepareDelete(type) {
  statusToChange = null;
  if (type === 'selected') {
    const checked = document.querySelectorAll('.row-checkbox:checked');
    if (!checked.length) return alert("請勾選");
    targetRowsToDelete = Array.from(checked).map(cb => parseInt(cb.value));
  } else if (type === 'all') { targetRowsToDelete = 'all'; }
  else { targetRowsToDelete = [type]; }
  document.getElementById('modalOverlay').style.display = 'flex';
}

document.getElementById('btnConfirm').onclick = async () => {
  const pwd = document.getElementById('pwdInput').value;
  document.getElementById('modalOverlay').style.display = 'none';
  showLoading(true);
  try {
    let p = { password: pwd };
    if (statusToChange !== null) { p.action = "setFormStatus"; p.status = statusToChange; }
    else { p.row = targetRowsToDelete; }
    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(p) });
    const result = await res.json();
    alert(result.message);
    fetchOrders(true); fetchFormStatus();
  } finally { showLoading(false); }
};

document.getElementById('btnCancel').onclick = () => { document.getElementById('modalOverlay').style.display = 'none'; };

function showLoading(show, text) {
  document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
  if(text) document.getElementById('loadingText').innerText = text;
}
</script>
</body>
</html>
