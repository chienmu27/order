<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>訂餐系統（填單 / 查詢 / 刪除 / 設定）</title>

  <style>
    :root {
      --primary: #4285f4;
      --danger: #dc3545;
      --bg: #f8f9fa;
      --card: #fff;
      --text: #333;
      --muted: #666;
      --border: #e5e7eb;
      --notice-bg: #fffbe6;
      --notice-border: #ffe58f;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* LINE 專用導引區塊 */
    #lineWarning {
      display: none;
      background: #fff3cd;
      color: #856404;
      padding: 12px;
      text-align: center;
      font-size: 14px;
      border-bottom: 2px solid #ffeeba;
      font-weight: bold;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 18px 14px 60px;
    }

    /* 選單區 */
    .menu-bar {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      padding: 14px;
      margin-bottom: 18px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand { display: flex; gap: 10px; align-items: center; font-weight: 800; font-size: 18px; }
    .brand .dot { width: 10px; height: 10px; border-radius: 999px; background: var(--primary); display: inline-block; }

    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav button {
      border: 1px solid var(--border);
      background: white;
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: 0.2s;
    }
    .nav button:hover { border-color: #cfd6e3; transform: translateY(-1px); }
    .nav button.active { background: var(--primary); border-color: var(--primary); color: white; }

    .page { display: none; }
    .page.active { display: block; }
    .card { background: white; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); padding: 18px; }

    /* 表單外部開啟提示 */
    .form-notice {
      background: #e1f5fe;
      padding: 12px;
      text-align: center;
      font-size: 14px;
      color: #01579b;
      border-radius: 12px 12px 0 0;
      border-bottom: 1px solid #b3e5fc;
    }
    .external-btn {
      display: inline-block;
      background: var(--primary);
      color: white !important;
      padding: 6px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 5px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }

    /* 填單框架 */
    .form-frame { width: 100%; height: 1800px; border: none; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
    @media (max-width: 768px) { .form-frame { height: 2500px; } }

    /* 頁面標題與按鈕佈局 */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .header-btns { display: flex; gap: 8px; }
    .refresh-btn { background: white; border: 1px solid #ddd; padding: 8px 12px; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 700; }
    .del-selected-btn { background: #fff0f0; border: 1px solid #ffaaaa; color: var(--danger); padding: 8px 12px; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 700; }
    .del-all-btn { background: white; border: 1px solid var(--danger); color: var(--danger); padding: 8px 12px; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 700; }

    /* 控制列樣式 */
    .controls { background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 10px 25px; align-items: center; }
    .controls label { font-weight: bold; font-size: 14px; }
    .controls select { font-size: 16px; padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: white; min-width: 200px; }
    
    /* 表格樣式 */
    .table-container { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 720px; font-size: 14px; }
    th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; border-right: 1px solid #f9f9f9; }
    th { background: #f8f9fa; color: #666; font-weight: bold; }
    .total-row { font-weight: bold; background: #e9ecef !important; }

    /* 功能按鈕 */
    .btn-del { background: #fff0f0; color: var(--danger); border: 1px solid #ffcccc; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-weight: 800; }
    input[type="checkbox"] { transform: scale(1.2); cursor: pointer; }

    /* 遮罩與彈窗 */
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; display: none; justify-content: center; align-items: center; }
    #modalBox { background: #fff; padding: 25px; border-radius: 14px; width: 90%; max-width: 340px; text-align: center; }
    #pwdInput { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

    /* 設定分頁 */
    .settings-card { background: white; border-radius: 16px; padding: 20px; max-width: 380px; margin: auto; border: 1px solid #eee; }
    .field { margin-bottom: 15px; }
    .field label { display: block; font-size: 14px; margin-bottom: 5px; color: #666; font-weight: bold; }
    .field input, .field select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    #btnSave { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    
    /* 表單狀態按鈕特化樣式 */
    .status-btns { display: flex; gap: 8px; margin-top: 8px; }
    .status-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.3s; }
    .status-btn.open { background: #e6f4ea; color: #1e7e34; border-color: #c3e6cb; }
    .status-btn.close { background: #fdf2f2; color: #dc3545; border-color: #f5c6cb; }
    .status-btn:hover { opacity: 0.8; }
  </style>
</head>

<body>

  <!-- LINE 警告欄 -->
  <div id="lineWarning">
    ⚠️ 偵測到您正在使用 LINE 開啟。為了正常登入 Google，建議點擊下方「用瀏覽器開啟」。
  </div>

  <div class="container">
    <div class="menu-bar">
      <div class="brand"><span class="dot"></span><span>訂餐系統</span></div>
      <div class="nav">
        <button class="active" data-page="formPage">📝 填單</button>
        <button data-page="queryPage">🔎 查詢</button>
        <button data-page="deletePage">🗑️ 刪除</button>
        <button data-page="settingsPage">⚙️ 設定</button>
      </div>
    </div>

    <!-- 填單分頁 -->
    <section id="formPage" class="page active">
      <div class="card" style="padding:0;">
        <div class="form-notice">
          <b>無法登入 Google 帳號？</b><br>
          <button class="external-btn" onclick="handleExternalLink()">🚀 使用系統瀏覽器開啟</button>
        </div>
        <iframe class="form-frame" src="https://docs.google.com/forms/d/e/1FAIpQLScooZ_B9Jm7a2-IsEfJhwhLR7hsLyy8knIU3TKuzM7pw_Z5RQ/viewform?usp=header" loading="lazy">載入中…</iframe>
      </div>
    </section>

    <!-- 查詢分頁 -->
    <section id="queryPage" class="page">
      <div class="card">
        <div class="header">
          <h3 id="sheetTitle" style="margin:0;">訂單查詢系統</h3>
          <button class="refresh-btn" onclick="loadQueryCSV(true)">🔄 重新整理</button>
        </div>
        <div class="controls">
          <div>
            <label>訂購人員：</label>
            <select id="buyerSelect"><option value="">--請選擇--</option></select>
          </div>
          <div>
            <label>訂單統計：</label>
            <select id="listSelect">
              <option value="">--請選擇--</option>
              <option value="list1">購買人 / 金額總計</option>
              <option value="list2">項目 / 訂購數量總計</option>
            </select>
          </div>
        </div>
        <div class="table-container">
          <table id="resultTable">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- 刪除分頁 -->
    <section id="deletePage" class="page">
      <div class="card">
        <div class="header">
          <h3 style="margin:0;">📋 訂單管理清單</h3>
          <div class="header-btns">
            <button class="refresh-btn" onclick="fetchOrders(true)">🔄 重新整理</button>
            <button class="del-selected-btn" onclick="prepareDelete('selected')">🗑️ 刪除選取</button>
            <button class="del-all-btn" onclick="prepareDelete('all')">⚠️ 全部刪除</button>
          </div>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th style="width: 40px;"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th>
                <th>時間</th><th>訂餐人員</th><th>便當品項</th><th>數量</th><th>備註</th><th>操作</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- 設定分頁 -->
    <section id="settingsPage" class="page">
      <div class="settings-card">
        <h3>訂餐管理系統</h3>
        <div class="field">
          <label>訂餐日期</label>
          <input type="date" id="orderDate">
        </div>
        <div class="field">
          <label>店家選單</label>
          <select id="restaurant"><option>載入中...</option></select>
        </div>

        <!-- 新增表單狀態控制功能 -->
        <div class="field">
          <label>表單接受回應狀態：<span id="formStatusLabel" style="color:var(--primary);">載入中...</span></label>
          <div class="status-btns">
            <button class="status-btn open" onclick="prepareStatusChange(true)">🟢 開啟回應</button>
            <button class="status-btn close" onclick="prepareStatusChange(false)">🔴 停止回應</button>
          </div>
        </div>

        <hr style="border:0; border-top:1px solid #eee; margin: 20px 0;">
        <div class="field"><label>管理帳號</label><input type="text" id="acc" placeholder="輸入帳號"></div>
        <div class="field"><label>管理密碼</label><input type="password" id="pwd" placeholder="輸入密碼"></div>
        <button onclick="sendData()" id="btnSave">送出設定</button>
        <div id="status" style="margin-top:10px; text-align:center;"></div>
      </div>
    </section>
  </div>

  <div id="loadingOverlay"><div class="spinner"></div><div id="loadingText" style="margin-top:15px; color:#555;">正在讀取資料...</div></div>
  
  <div id="modalOverlay">
    <div id="modalBox">
      <h3 style="margin-top:0;">身分驗證</h3>
      <p id="modalDesc" style="color:#666; font-size:14px;">請輸入管理密碼</p>
      <input type="password" id="pwdInput" placeholder="請輸入密碼">
      <div class="modal-btns">
        <button id="btnCancel" style="background:#eee;">取消</button>
        <button id="btnConfirm" style="background:var(--primary); color:white;">確認</button>
      </div>
    </div>
  </div>

<script>
/**
 * 請將下方的 GAS_URL 替換為您佈署後的 Web App 網址
 */
const GAS_URL = "https://script.google.com/macros/s/AKfycbzh9zPFHf6vmhQQR7LrHlokXkPPKnQ2u9ZiqnL6x9kMe4YSaMkrLJJOsqU72OXOIwwo/exec"; 

/**
 * 外部瀏覽器跳轉邏輯
 */
const rawFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLScooZ_B9Jm7a2-IsEfJhwhLR7hsLyy8knIU3TKuzM7pw_Z5RQ/viewform";

function handleExternalLink() {
    const isAndroid = /Android/i.test(navigator.userAgent);
    if (isAndroid) {
        const intentUrl = `intent://${rawFormUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`;
        window.location.href = intentUrl;
    } else {
        const externalUrl = rawFormUrl + (rawFormUrl.includes('?') ? '&' : '?') + "openExternalBrowser=1";
        window.location.href = externalUrl;
    }
}

function checkBrowser() {
    if (/Line/i.test(navigator.userAgent)) {
        document.getElementById('lineWarning').style.display = 'block';
    }
}

/**
 * 1. 基礎設定與延遲載入導覽
 */
function setDefaultDate() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  document.getElementById('orderDate').value = `${yyyy}-${mm}-${dd}`;
}

(function initNav(){
  setDefaultDate();
  checkBrowser();
  const navButtons = document.querySelectorAll(".nav button");
  const pages = document.querySelectorAll(".page");
  navButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.page;
      pages.forEach(p => p.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      navButtons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      
      if(id === "deletePage") fetchOrders(); 
      if(id === "queryPage") loadQueryCSV();
      if(id === "settingsPage") {
          loadSettingsOptions();
          fetchFormStatus(); // 進入設定頁時抓取表單狀態
      }
    });
  });
})();

/**
 * 新增：抓取表單接受回應狀態
 */
async function fetchFormStatus() {
  const label = document.getElementById('formStatusLabel');
  label.innerText = "查詢中...";
  try {
    const res = await fetch(`${GAS_URL}?action=getFormStatus`);
    const data = await res.json();
    if (data.status === "success") {
      label.innerText = data.accepting ? "🟢 接受回應中" : "🔴 已停止回應";
      label.style.color = data.accepting ? "#1e7e34" : "#dc3545";
    } else {
      label.innerText = "查詢失敗";
    }
  } catch (e) {
    label.innerText = "連線出錯";
  }
}

/**
 * 新增：處理表單狀態變更的驗證流程
 */
let statusToChange = null;
function prepareStatusChange(status) {
    statusToChange = status;
    const text = status ? "開啟接受回應" : "關閉接受回應";
    document.getElementById('modalDesc').innerText = `確定要將表單設定為「${text}」嗎？請輸入密碼。`;
    document.getElementById('modalOverlay').style.display = 'flex';
}

/**
 * 2. 查詢分頁邏輯
 */
const queryCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQISD3cRAvsldviyxyfFi7xQVE12l900EW1yu8_OXOS-uDIr12XAr8zISHsZpJzTBLe_j4kuHWwgdG6/pub?gid=1785595426&single=true&output=csv";
let queryHeader = [];
let queryDataRows = [];

async function loadQueryCSV(force = false) {
  if (queryDataRows.length > 0 && !force) return;
  showLoading(true, "讀取查詢資料中...");
  try {
    const res = await fetch(queryCsvUrl + "&t=" + Date.now());
    const text = await res.text();
    const parsed = parseCSV(text);
    const rows = parsed.filter(r => r.some(c => (c ?? "").trim() !== ""));
    if (rows.length > 1) {
      const titleInfo = rows[0];
      document.getElementById("sheetTitle").innerText = (titleInfo[2] || "訂單查詢") + " (" + (titleInfo[0] || "") + ")";
      queryHeader = rows[1]; 
      queryDataRows = rows.slice(2);
      buildBuyerDropdown();
    }
  } catch (e) { alert("讀取查詢資料失敗"); } finally { showLoading(false); }
}

function buildBuyerDropdown() {
  const buyerIdx = queryHeader.indexOf("購買人");
  if (buyerIdx === -1) return;
  const set = new Set();
  queryDataRows.forEach(r => {
    const val = (r[buyerIdx] ?? "").trim();
    if (val && val !== "購買人") set.add(val);
  });
  const select = document.getElementById("buyerSelect");
  select.innerHTML = '<option value="">--請選擇--</option><option value="ALL">全部訂單清單</option>';
  [...set].sort().forEach(v => {
    const op = document.createElement("option");
    op.value = v; op.textContent = v;
    select.appendChild(op);
  });
}

function renderNormalTable(buyer) {
  const thead = document.querySelector("#resultTable thead");
  const tbody = document.querySelector("#resultTable tbody");
  thead.innerHTML = `<tr><th>購買人</th><th>項目</th><th>單價</th><th>加點</th><th>備註</th><th>數量</th><th>小計</th></tr>`;
  tbody.innerHTML = "";
  const idx = {
    user: queryHeader.indexOf("購買人"), item: queryHeader.indexOf("項目"), price: queryHeader.indexOf("單價"),
    rice: queryHeader.indexOf("加點"), add: queryHeader.indexOf("備註"), qty: queryHeader.indexOf("數量"), sub: queryHeader.indexOf("小計")
  };
  let filtered = (buyer === "ALL") ? queryDataRows : queryDataRows.filter(r => (r[idx.user] ?? "").trim() === buyer);
  let totalSum = 0;
  filtered.forEach(r => {
    const subTotal = Number(r[idx.sub]) || 0;
    totalSum += subTotal;
    tbody.innerHTML += `<tr><td>${r[idx.user]||""}</td><td>${r[idx.item]||""}</td><td>${r[idx.price]||""}</td><td>${r[idx.rice]||""}</td><td>${r[idx.add]||""}</td><td>${r[idx.qty]||""}</td><td>${subTotal}</td></tr>`;
  });
  if (buyer !== "ALL" && filtered.length > 0) {
    tbody.innerHTML += `<tr class="total-row"><td colspan="6">個人合計</td><td>${totalSum}</td></tr>`;
  }
}

function renderList1() {
  const idxBuyer = queryHeader.indexOf("購買人"), idxSub = queryHeader.indexOf("小計");
  const thead = document.querySelector("#resultTable thead"), tbody = document.querySelector("#resultTable tbody");
  thead.innerHTML = `<tr><th>購買人</th><th>金額總計</th></tr>`;
  tbody.innerHTML = "";
  const summary = {};
  queryDataRows.forEach(r => {
    const name = (r[idxBuyer] ?? "").trim();
    const amt = Number(r[idxSub]) || 0;
    if (name) summary[name] = (summary[name] || 0) + amt;
  });
  let grandTotal = 0;
  Object.keys(summary).sort().forEach(name => {
    grandTotal += summary[name];
    tbody.innerHTML += `<tr><td>${name}</td><td>${summary[name]}</td></tr>`;
  });
  tbody.innerHTML += `<tr class="total-row"><td>全體總計</td><td>${grandTotal}</td></tr>`;
}

function renderList2() {
  const idxItem = queryHeader.indexOf("項目"), idxQty = queryHeader.indexOf("數量");
  const thead = document.querySelector("#resultTable thead"), tbody = document.querySelector("#resultTable tbody");
  thead.innerHTML = `<tr><th>項目</th><th>訂購數量總計</th></tr>`;
  tbody.innerHTML = "";
  const summary = {};
  queryDataRows.forEach(r => {
    const item = (r[idxItem] ?? "").trim();
    const qty = Number(r[idxQty]) || 0;
    if (item) summary[item] = (summary[item] || 0) + qty;
  });
  let grandQty = 0;
  Object.keys(summary).sort().forEach(item => {
    grandQty += summary[item];
    tbody.innerHTML += `<tr><td>${item}</td><td>${summary[item]}</td></tr>`;
  });
  tbody.innerHTML += `<tr class="total-row"><td>總數量</td><td>${grandQty}</td></tr>`;
}

document.getElementById("buyerSelect").addEventListener("change", (e) => {
  document.getElementById("listSelect").value = "";
  if (e.target.value) renderNormalTable(e.target.value);
});
document.getElementById("listSelect").addEventListener("change", (e) => {
  document.getElementById("buyerSelect").value = "";
  const opt = e.target.value;
  if (opt === "list1") renderList1();
  else if (opt === "list2") renderList2();
});

/**
 * 3. 刪除分頁邏輯
 */
let targetRowsToDelete = null;

async function fetchOrders(force = false) {
  if (hasFetchedOrders && !force) return;
  showLoading(true, "讀取訂單清單...");
  try {
    const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQISD3cRAvsldviyxyfFi7xQVE12l900EW1yu8_OXOS-uDIr12XAr8zISHsZpJzTBLe_j4kuHWwgdG6/pub?gid=1605656850&single=true&output=csv&t=" + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);
    const tbody = document.getElementById('tableBody');
    if (rows.length < 2) { tbody.innerHTML = '<tr><td colspan="7">目前尚無任何訂單</td></tr>'; return; }
    tbody.innerHTML = rows.slice(1).map((row, i) => `<tr><td><input type="checkbox" class="row-checkbox" value="${i+2}"></td><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]||""}</td><td><button class="btn-del" onclick="prepareDelete(${i+2})">刪除</button></td></tr>`).join('');
    hasFetchedOrders = true;
  } catch (e) { alert("無法獲取訂單清單"); } finally { showLoading(false); }
}

let hasFetchedOrders = false;

function toggleSelectAll(source) {
  document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = source.checked);
}

function prepareDelete(type) {
  statusToChange = null; // 重設狀態變更標記，確保是刪除動作
  if (type === 'selected') {
    const checked = document.querySelectorAll('.row-checkbox:checked');
    if (checked.length === 0) { alert("請勾選訂單"); return; }
    targetRowsToDelete = Array.from(checked).map(cb => parseInt(cb.value));
    document.getElementById('modalDesc').innerText = `確定要刪除選取的 ${targetRowsToDelete.length} 筆訂單嗎？`;
  } else if (type === 'all') {
    targetRowsToDelete = 'all';
    document.getElementById('modalDesc').innerText = "確定要刪除「全部」訂單資料嗎？";
  } else {
    targetRowsToDelete = [type];
    document.getElementById('modalDesc').innerText = "請輸入密碼確認刪除";
  }
  document.getElementById('modalOverlay').style.display = 'flex';
}

/**
 * 彈窗確認按鈕 (合併處理刪除訂單與變更表單狀態)
 */
document.getElementById('btnConfirm').onclick = async () => {
  const pwd = document.getElementById('pwdInput').value;
  if(!pwd) return;
  document.getElementById('modalOverlay').style.display = 'none';
  document.getElementById('pwdInput').value = '';
  showLoading(true, "處理中...");

  try {
    let payload = {};
    // 如果 statusToChange 不為 null，代表正在處理「表單狀態變更」
    if (statusToChange !== null) {
        payload = { action: "setFormStatus", status: statusToChange, password: pwd };
    } else {
        // 否則為處理「訂單刪除」
        payload = { row: targetRowsToDelete, password: pwd };
    }

    const res = await fetch(GAS_URL, { 
        method: 'POST', 
        body: JSON.stringify(payload) 
    });
    const result = await res.json();
    alert(result.message);

    if(result.status === 'success') {
        if (statusToChange !== null) {
            fetchFormStatus(); // 更新 UI 上的狀態顯示
        } else {
            fetchOrders(true); // 重新整理訂單清單
        }
    }
  } catch(e) { 
      alert("執行失敗"); 
  } finally { 
      showLoading(false); 
      statusToChange = null; 
  }
};

document.getElementById('btnCancel').onclick = () => { 
    document.getElementById('modalOverlay').style.display = 'none'; 
    statusToChange = null;
};

/**
 * 4. 設定與工具
 */
const SCRIPT_URL_SET = 'https://script.google.com/macros/s/AKfycbxsG1au7MoB7WKs397tM0ZQciSZkdyM_U5Bgb7FBTzOn9OVLFi6_94waAz3HEddovIY/exec';
let hasLoadedSettings = false;

async function loadSettingsOptions() {
  if (hasLoadedSettings) return;
  try {
    const res = await fetch(SCRIPT_URL_SET + "?action=getOptions");
    const data = await res.json();
    const select = document.getElementById('restaurant');
    select.innerHTML = '';
    data.forEach(item => { if(item) { let opt = document.createElement('option'); opt.value = opt.innerHTML = item; select.appendChild(opt); } });
    hasLoadedSettings = true;
  } catch(e) { console.error("店家選單載入失敗"); }
}

async function sendData() {
  const btn = document.getElementById('btnSave'), status = document.getElementById('status');
  const d = document.getElementById('orderDate').value, s = document.getElementById('restaurant').value, a = document.getElementById('acc').value, p = document.getElementById('pwd').value;
  if (!a || !p || !d || !s) { alert("請填寫完整資訊"); return; }
  btn.disabled = true; status.innerHTML = "處理中...";
  try {
    const r = await fetch(`${SCRIPT_URL_SET}?action=submit&date=${d}&store=${s}&acc=${a}&pwd=${p}`);
    const t = await r.text();
    status.innerHTML = t;
    status.style.color = t.includes("成功") ? "green" : "red";
  } catch(e) { status.innerHTML = "連線失敗"; } finally { btn.disabled = false; }
}

function parseCSV(text) {
  const result = []; let cur = []; let curVal = ""; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i+1];
    if (inQuotes) {
      if (ch === '"' && next === '"') { curVal += '"'; i++; }
      else if (ch === '"') inQuotes = false;
      else curVal += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { cur.push(curVal); curVal = ""; }
      else if (ch === '\n') { cur.push(curVal); result.push(cur); cur = []; curVal = ""; }
      else if (ch !== '\r') curVal += ch;
    }
  }
  if (curVal !== "" || cur.length > 0) { cur.push(curVal); result.push(cur); }
  return result;
}

function showLoading(show, text) {
  document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
  if(text) document.getElementById('loadingText').innerText = text;
}
