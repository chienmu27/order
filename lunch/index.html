<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>訂餐系統（填單 / 查詢 / 刪除 / 設定）</title>
  <style>
    :root { --primary: #4285f4; --danger: #dc3545; --bg: #f8f9fa; --card: #fff; --text: #333; --muted: #666; --border: #e5e7eb; }
    body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); }
    #lineWarning { display: none; background: #fff3cd; color: #856404; padding: 12px; text-align: center; font-size: 14px; border-bottom: 2px solid #ffeeba; font-weight: bold; }
    .container { max-width: 1100px; margin: auto; padding: 18px 14px 60px; }
    .menu-bar { background: white; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); padding: 14px; margin-bottom: 18px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; }
    .brand { display: flex; gap: 10px; align-items: center; font-weight: 800; font-size: 18px; }
    .brand .dot { width: 10px; height: 10px; border-radius: 999px; background: var(--primary); display: inline-block; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav button { border: 1px solid var(--border); background: white; padding: 9px 12px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.2s; }
    .nav button.active { background: var(--primary); border-color: var(--primary); color: white; }
    .page { display: none; }
    .page.active { display: block; }
    .card { background: white; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); padding: 18px; }
    .form-notice { background: #e1f5fe; padding: 12px; text-align: center; font-size: 14px; color: #01579b; border-radius: 12px 12px 0 0; border-bottom: 1px solid #b3e5fc; }
    .external-btn { display: inline-block; background: var(--primary); color: white !important; padding: 6px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-top: 5px; border: none; cursor: pointer; font-size: 13px; }
    .form-frame { width: 100%; height: 1800px; border: none; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .refresh-btn { background: white; border: 1px solid #ddd; padding: 8px 12px; cursor: pointer; border-radius: 10px; font-size: 14px; font-weight: 700; }
    .controls { background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 10px 25px; align-items: center; }
    .controls select { font-size: 16px; padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: white; min-width: 200px; }
    .table-container { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 720px; font-size: 14px; }
    th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; color: #666; font-weight: bold; }
    .total-row { font-weight: bold; background: #e9ecef !important; }
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; display: none; justify-content: center; align-items: center; }
    #modalBox { background: #fff; padding: 25px; border-radius: 14px; width: 90%; max-width: 340px; text-align: center; }
    #pwdInput { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 10px; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .settings-card { background: white; border-radius: 16px; padding: 20px; max-width: 380px; margin: auto; border: 1px solid #eee; }
    .field { margin-bottom: 15px; }
    .field label { display: block; font-size: 14px; margin-bottom: 5px; color: #666; font-weight: bold; }
    .field input, .field select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; }
    #btnSave { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <div id="lineWarning">⚠️ 偵測到您正在使用 LINE 開啟。建議點擊下方「用瀏覽器開啟」。</div>
  <div class="container">
    <div class="menu-bar">
      <div class="brand"><span class="dot"></span><span>訂餐系統</span></div>
      <div class="nav">
        <button class="active" data-page="formPage">📝 填單</button>
        <button data-page="queryPage">🔎 查詢</button>
        <button data-page="deletePage">🗑️ 刪除</button>
        <button data-page="settingsPage">⚙️ 設定</button>
      </div>
    </div>
    <section id="formPage" class="page active">
      <div class="card" style="padding:0;">
        <div class="form-notice"><b>無法登入 Google？</b><button class="external-btn" onclick="handleExternalLink()">🚀 使用系統瀏覽器開啟</button></div>
        <iframe class="form-frame" src="https://docs.google.com/forms/d/e/1FAIpQLScooZ_B9Jm7a2-IsEfJhwhLR7hsLyy8knIU3TKuzM7pw_Z5RQ/viewform?usp=header" loading="lazy"></iframe>
      </div>
    </section>
    <section id="queryPage" class="page">
      <div class="card">
        <div class="header"><h3 id="sheetTitle" style="margin:0;">訂單查詢系統</h3><button class="refresh-btn" onclick="loadQueryData(true)">🔄 重新整理</button></div>
        <div class="controls">
          <div><label>訂購人員：</label><select id="buyerSelect"><option value="">--請選擇--</option></select></div>
          <div><label>訂單統計：</label><select id="listSelect"><option value="">--請選擇--</option><option value="list1">購買人 / 金額總計</option><option value="list2">項目 / 訂購數量總計</option></select></div>
        </div>
        <div class="table-container"><table id="resultTable"><thead></thead><tbody></tbody></table></div>
      </div>
    </section>
    <section id="deletePage" class="page">
      <div class="card">
        <div class="header">
          <h3 style="margin:0;">📋 訂單管理清單</h3>
          <div style="display:flex; gap:8px;">
            <button class="refresh-btn" onclick="fetchOrders(true)">🔄 重新整理</button>
            <button style="background:#fff0f0; border:1px solid #ffaaaa; color:var(--danger); padding:8px 12px; border-radius:10px; cursor:pointer;" onclick="prepareDelete('selected')">🗑️ 刪除選取</button>
            <button style="background:white; border:1px solid var(--danger); color:var(--danger); padding:8px 12px; border-radius:10px; cursor:pointer;" onclick="prepareDelete('all')">⚠️ 全部刪除</button>
          </div>
        </div>
        <div class="table-container">
          <table><thead><tr><th><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th><th>時間</th><th>訂餐人員</th><th>品項</th><th>數量</th><th>備註</th><th>操作</th></tr></thead>
          <tbody id="tableBody"></tbody></table>
        </div>
      </div>
    </section>
    <section id="settingsPage" class="page">
      <div class="settings-card">
        <h3>訂餐管理系統</h3>
        <div class="field"><label>訂餐日期</label><input type="date" id="orderDate"></div>
        <div class="field"><label>店家選單</label><select id="restaurant"><option>載入中...</option></select></div>
        <div class="field"><label>表單狀態：<span id="formStatusLabel" style="color:var(--primary);">載入中...</span></label>
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button style="flex:1; padding:10px; background:#e6f4ea; border:1px solid #c3e6cb; border-radius:10px; cursor:pointer;" onclick="prepareStatusChange(true)">🟢 開啟</button>
            <button style="flex:1; padding:10px; background:#fdf2f2; border:1px solid #f5c6cb; border-radius:10px; cursor:pointer;" onclick="prepareStatusChange(false)">🔴 停止</button>
          </div>
        </div>
        <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
        <div class="field"><label>帳號</label><input type="text" id="acc"></div>
        <div class="field"><label>密碼</label><input type="password" id="pwd"></div>
        <button onclick="sendData()" id="btnSave">送出設定</button>
        <div id="status" style="margin-top:10px; text-align:center;"></div>
      </div>
    </section>
  </div>
  <div id="loadingOverlay"><div class="spinner"></div><div id="loadingText" style="margin-top:15px; color:#555;">處理中...</div></div>
  <div id="modalOverlay">
    <div id="modalBox"><h3>身分驗證</h3><p id="modalDesc">請輸入管理密碼</p><input type="password" id="pwdInput"><div class="modal-btns">
      <button onclick="document.getElementById('modalOverlay').style.display='none'" style="background:#eee;">取消</button>
      <button id="btnConfirm" style="background:var(--primary); color:white;">確認</button>
    </div></div>
  </div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzh9zPFHf6vmhQQR7LrHlokXkPPKnQ2u9ZiqnL6x9kMe4YSaMkrLJJOsqU72OXOIwwo/exec"; 
const rawFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLScooZ_B9Jm7a2-IsEfJhwhLR7hsLyy8knIU3TKuzM7pw_Z5RQ/viewform";

let queryHeader = [];
let queryDataRows = [];
let statusToChange = null;
let targetRowsToDelete = null;

function handleExternalLink() {
  if (/Android/i.test(navigator.userAgent)) window.location.href = `intent://${rawFormUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`;
  else window.location.href = rawFormUrl + "?openExternalBrowser=1";
}

(function initNav(){
  const today = new Date();
  document.getElementById('orderDate').value = today.toISOString().split('T')[0];
  if (/Line/i.test(navigator.userAgent)) document.getElementById('lineWarning').style.display = 'block';
  document.querySelectorAll(".nav button").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.page;
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      if(id === "deletePage") fetchOrders(true);
      if(id === "queryPage") loadQueryData(true);
      if(id === "settingsPage") { loadSettingsOptions(); fetchFormStatus(); }
    });
  });
})();

async function loadQueryData(force = false) {
  if (queryDataRows.length > 0 && !force) return;
  showLoading(true, "讀取資料...");
  try {
    const res = await fetch(`${GAS_URL}?action=getOrders&sheetName=訂餐&t=${Date.now()}`);
    const result = await res.json();
    if (result.status === "success") {
      const rows = result.data;
      if (rows.length > 1) {
        let d = new Date(rows[0][0]);
        let displayDate = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        document.getElementById("sheetTitle").innerText = (rows[0][2] || "訂單查詢") + " (" + displayDate + ")";
        queryHeader = rows[1].map(h => String(h).trim()); // 去除欄位名稱空格
        queryDataRows = rows.slice(2);
        buildBuyerDropdown();
        renderNormalTable("ALL"); // 預設顯示全部
      }
    }
  } catch (e) { alert("讀取失敗"); } finally { showLoading(false); }
}

function buildBuyerDropdown() {
  const bIdx = queryHeader.indexOf("購買人");
  if (bIdx === -1) return;
  const set = new Set();
  queryDataRows.forEach(r => { if(String(r[bIdx]||"").trim()) set.add(String(r[bIdx]).trim()); });
  const select = document.getElementById("buyerSelect");
  select.innerHTML = '<option value="">--請選擇--</option><option value="ALL">全部訂單清單</option>';
  [...set].sort().forEach(v => { select.innerHTML += `<option value="${v}">${v}</option>`; });
}

function renderNormalTable(buyer) {
  if (!buyer) return;
  const thead = document.querySelector("#resultTable thead"), tbody = document.querySelector("#resultTable tbody");
  // 這裡使用動態標題確保索引正確
  thead.innerHTML = `<tr>${queryHeader.map(h => `<th>${h}</th>`).join('')}</tr>`;
  tbody.innerHTML = "";
  const bIdx = queryHeader.indexOf("購買人");
  let filtered = queryDataRows.filter(r => String(r[bIdx]||"").trim() !== ""); // 先過濾空白購買人
  if (buyer !== "ALL") filtered = filtered.filter(r => String(r[bIdx]).trim() === buyer);
  
  let totalSum = 0, subIdx = queryHeader.indexOf("小計");
  filtered.forEach(r => {
    tbody.innerHTML += `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`;
    if(subIdx !== -1) totalSum += Number(r[subIdx]) || 0;
  });
  if (buyer !== "ALL" && filtered.length > 0) tbody.innerHTML += `<tr class="total-row"><td colspan="${queryHeader.length-1}">個人合計</td><td>${totalSum}</td></tr>`;
}

function renderList1() {
  const bIdx = queryHeader.indexOf("購買人"), sIdx = queryHeader.indexOf("小計");
  if (bIdx === -1 || sIdx === -1) { alert("找不到必要欄位(購買人/小計)"); return; }
  const thead = document.querySelector("#resultTable thead"), tbody = document.querySelector("#resultTable tbody");
  thead.innerHTML = `<tr><th>購買人</th><th>金額總計</th></tr>`;
  tbody.innerHTML = "";
  const summary = {};
  queryDataRows.forEach(r => {
    const name = String(r[bIdx]||"").trim();
    if (name) summary[name] = (summary[name] || 0) + (Number(r[sIdx]) || 0);
  });
  let grandTotal = 0;
  Object.keys(summary).sort().forEach(n => {
    grandTotal += summary[n]; tbody.innerHTML += `<tr><td>${n}</td><td>${summary[n]}</td></tr>`;
  });
  tbody.innerHTML += `<tr class="total-row"><td>全體總計</td><td>${grandTotal}</td></tr>`;
}

function renderList2() {
  const iIdx = queryHeader.indexOf("項目"), qIdx = queryHeader.indexOf("數量");
  if (iIdx === -1 || qIdx === -1) { alert("找不到必要欄位(項目/數量)"); return; }
  const thead = document.querySelector("#resultTable thead"), tbody = document.querySelector("#resultTable tbody");
  thead.innerHTML = `<tr><th>項目</th><th>數量總計</th></tr>`;
  tbody.innerHTML = "";
  const summary = {};
  queryDataRows.forEach(r => {
    const item = String(r[iIdx]||"").trim();
    if (item && item !== "項目") summary[item] = (summary[item] || 0) + (Number(r[qIdx]) || 0);
  });
  let grandQty = 0;
  Object.keys(summary).sort().forEach(i => {
    grandQty += summary[i]; tbody.innerHTML += `<tr><td>${i}</td><td>${summary[i]}</td></tr>`;
  });
  tbody.innerHTML += `<tr class="total-row"><td>總數量</td><td>${grandQty}</td></tr>`;
}

document.getElementById("buyerSelect").addEventListener("change", (e) => {
  document.getElementById("listSelect").value = "";
  renderNormalTable(e.target.value);
});
document.getElementById("listSelect").addEventListener("change", (e) => {
  document.getElementById("buyerSelect").value = "";
  if (e.target.value === "list1") renderList1(); 
  else if (e.target.value === "list2") renderList2();
});

async function fetchOrders(force = false) {
  showLoading(true, "讀取中...");
  try {
    const res = await fetch(`${GAS_URL}?action=getOrders&t=${Date.now()}`);
    const result = await res.json();
    const tbody = document.getElementById('tableBody');
    if (result.status === "success") {
      tbody.innerHTML = result.data.slice(1).map((row, i) => `
        <tr>
          <td><input type="checkbox" class="row-checkbox" value="${i+2}"></td>
          <td>${row[0] ? new Date(row[0]).toLocaleString('zh-TW', { hour12: true }) : ""}</td>
          <td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td><td>${row[5]||""}</td>
          <td><button onclick="prepareDelete(${i+2})" style="color:red; cursor:pointer;">刪除</button></td>
        </tr>`).join('');
    }
  } catch (e) {} finally { showLoading(false); }
}

async function fetchFormStatus() {
  const lbl = document.getElementById('formStatusLabel');
  try {
    const res = await fetch(`${GAS_URL}?action=getFormStatus`);
    const data = await res.json();
    lbl.innerText = data.accepting ? "🟢 接受中" : "🔴 已停止";
    lbl.style.color = data.accepting ? "green" : "red";
  } catch (e) {}
}

function prepareDelete(row) { targetRowsToDelete = row; statusToChange = null; document.getElementById('modalOverlay').style.display='flex'; }
function prepareStatusChange(s) { statusToChange = s; targetRowsToDelete = null; document.getElementById('modalOverlay').style.display='flex'; }

document.getElementById('btnConfirm').onclick = async () => {
  const pwd = document.getElementById('pwdInput').value;
  document.getElementById('modalOverlay').style.display = 'none';
  showLoading(true, "處理中...");
  try {
    let payload = { password: pwd };
    if (statusToChange !== null) { payload.action = "setFormStatus"; payload.status = statusToChange; }
    else { payload.row = targetRowsToDelete; }
    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
    const result = await res.json();
    alert(result.message);
    if(result.status === 'success') { fetchOrders(true); fetchFormStatus(); }
  } catch(e) { alert("連線失敗"); } finally { showLoading(false); document.getElementById('pwdInput').value=''; }
};

async function loadSettingsOptions() {
  const SCRIPT_SET = 'https://script.google.com/macros/s/AKfycbxsG1au7MoB7WKs397tM0ZQciSZkdyM_U5Bgb7FBTzOn9OVLFi6_94waAz3HEddovIY/exec';
  try {
    const res = await fetch(SCRIPT_SET + "?action=getOptions");
    const data = await res.json();
    const sel = document.getElementById('restaurant');
    sel.innerHTML = data.filter(i => i).map(i => `<option value="${i}">${i}</option>`).join('');
  } catch(e) {}
}

async function sendData() {
  const SCRIPT_SET = 'https://script.google.com/macros/s/AKfycbxsG1au7MoB7WKs397tM0ZQciSZkdyM_U5Bgb7FBTzOn9OVLFi6_94waAz3HEddovIY/exec';
  const d = document.getElementById('orderDate').value, s = document.getElementById('restaurant').value, a = document.getElementById('acc').value, p = document.getElementById('pwd').value;
  try {
    const res = await fetch(`${SCRIPT_SET}?action=submit&date=${d}&store=${s}&acc=${a}&pwd=${p}`);
    document.getElementById('status').innerText = await res.text();
  } catch(e) { document.getElementById('status').innerText = "連線失敗"; }
}

function showLoading(s, t) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; document.getElementById('loadingText').innerText = t; }
function toggleSelectAll(s) { document.querySelectorAll('.row-checkbox').forEach(c => c.checked = s.checked); }
</script>
</body>
</html>
