<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>訂餐系統（填單 / 查詢 / 刪除 / 設定）</title>
  <style>
    :root { --primary: #4285f4; --danger: #dc3545; --bg: #f8f9fa; --card: #fff; --text: #333; --muted: #666; --border: #e5e7eb; }
    body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); }
    #lineWarning { display: none; background: #fff3cd; padding: 12px; text-align: center; font-size: 14px; border-bottom: 2px solid #ffeeba; font-weight: bold; }
    .container { max-width: 1100px; margin: auto; padding: 18px 14px 60px; }
    .menu-bar { background: white; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); padding: 14px; margin-bottom: 18px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; }
    .brand { display: flex; gap: 10px; align-items: center; font-weight: 800; font-size: 18px; }
    .brand .dot { width: 10px; height: 10px; border-radius: 999px; background: var(--primary); display: inline-block; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav button { border: 1px solid var(--border); background: white; padding: 9px 12px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.2s; }
    .nav button.active { background: var(--primary); color: white; border-color: var(--primary); }
    .page { display: none; }
    .page.active { display: block; }
    .card { background: white; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); padding: 18px; }
    .form-notice { background: #e1f5fe; padding: 12px; text-align: center; font-size: 14px; color: #01579b; border-radius: 12px 12px 0 0; }
    .external-btn { background: var(--primary); color: white; padding: 6px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; font-size: 13px; margin-top: 5px; }
    .form-frame { width: 100%; height: 1800px; border: none; }
    @media (max-width: 768px) { .form-frame { height: 2500px; } }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .refresh-btn { background: white; border: 1px solid #ddd; padding: 8px 12px; cursor: pointer; border-radius: 10px; font-weight: 700; }
    .controls { background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
    .table-container { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 720px; font-size: 14px; }
    th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; color: #666; }
    .total-row { font-weight: bold; background: #f0f4ff !important; }
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; display: none; justify-content: center; align-items: center; }
    #modalBox { background: #fff; padding: 25px; border-radius: 14px; width: 300px; text-align: center; }
  </style>
</head>
<body>

  <div id="lineWarning">⚠️ 偵測到您正在使用 LINE 開啟。為了正常登入 Google，建議點擊下方「用瀏覽器開啟」。</div>

  <div class="container">
    <div class="menu-bar">
      <div class="brand"><span class="dot"></span><span>訂餐系統</span></div>
      <div class="nav">
        <button class="active" data-page="formPage">📝 填單</button>
        <button data-page="queryPage">🔎 查詢</button>
        <button data-page="deletePage">🗑️ 刪除</button>
        <button data-page="settingsPage">⚙️ 設定</button>
      </div>
    </div>

    <!-- 填單分頁 -->
    <section id="formPage" class="page active">
      <div class="card" style="padding:0;">
        <div class="form-notice">
          <b>無法登入 Google 帳號？</b><br>
          <button class="external-btn" onclick="handleExternalLink()">🚀 使用系統瀏覽器開啟</button>
        </div>
        <iframe class="form-frame" src="https://docs.google.com/forms/d/e/1FAIpQLScooZ_B9Jm7a2-IsEfJhwhLR7hsLyy8knIU3TKuzM7pw_Z5RQ/viewform?usp=header" loading="lazy">載入中…</iframe>
      </div>
    </section>

    <!-- 查詢分頁 -->
    <section id="queryPage" class="page">
      <div class="card">
        <div class="header">
          <h3 id="sheetTitle" style="margin:0;">訂單查詢</h3>
          <button class="refresh-btn" onclick="loadQueryData(true)">🔄 重新整理</button>
        </div>
        <div class="controls">
          <div><label>訂購人員：</label><select id="buyerSelect"><option value="">--請選擇--</option></select></div>
          <div><label>訂單統計：</label><select id="listSelect">
            <option value="">--請選擇--</option>
            <option value="list1">購買人 / 金額總計</option>
            <option value="list2">項目 / 訂購數量總計</option>
          </select></div>
        </div>
        <div class="table-container">
          <table id="resultTable"><thead></thead><tbody></tbody></table>
        </div>
      </div>
    </section>

    <!-- 刪除分頁 -->
    <section id="deletePage" class="page">
      <div class="card">
        <div class="header">
          <h3 style="margin:0;">📋 訂單管理清單</h3>
          <div style="display:flex; gap:8px;">
            <button class="refresh-btn" onclick="fetchOrders(true)">🔄 重新整理</button>
            <button class="refresh-btn" style="color:var(--danger);" onclick="prepareDelete('all')">⚠️ 全部刪除</button>
          </div>
        </div>
        <div class="table-container">
          <table>
            <thead><tr><th>時間</th><th>訂餐人員</th><th>便當品項</th><th>數量</th><th>操作</th></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- 設定分頁 (略，保留原功能) -->
    <section id="settingsPage" class="page">
        <div class="card" style="max-width:400px; margin:auto;">
            <h3>管理設定</h3>
            <p>請在此進行後台系統參數設定。</p>
            <!-- 保持原有的設定表單結構 -->
        </div>
    </section>
  </div>

  <div id="loadingOverlay"><div class="spinner"></div><div id="loadingText" style="margin-top:15px;">處理中...</div></div>
  <div id="modalOverlay">
    <div id="modalBox">
      <h3>身分驗證</h3>
      <input type="password" id="pwdInput" placeholder="請輸入管理密碼" style="width:100%; padding:10px; margin-bottom:15px; box-sizing:border-box;">
      <div style="display:flex; gap:10px;">
        <button onclick="closeModal()" style="flex:1; padding:10px;">取消</button>
        <button id="btnConfirm" style="flex:1; padding:10px; background:var(--primary); color:white; border:none;">確認</button>
      </div>
    </div>
  </div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzh9zPFHf6vmhQQR7LrHlokXkPPKnQ2u9ZiqnL6x9kMe4YSaMkrLJJOsqU72OXOIwwo/exec"; 

let queryHeader = [];
let queryDataRows = [];

// 1. 修正日期顯示問題與空白過濾
async function loadQueryData(force = false) {
  if (queryDataRows.length > 0 && !force) return;
  showLoading(true, "讀取最新查詢資料...");
  try {
    const res = await fetch(`${GAS_URL}?action=getOrders&sheetName=訂餐&t=${Date.now()}`);
    const result = await res.json();
    if (result.status === "success") {
      const rows = result.data;
      if (rows.length > 1) {
        const titleInfo = rows[0];
        queryHeader = rows[1];
        const buyerIdx = queryHeader.indexOf("購買人");

        // 修改1: 修正日期顯示，去掉 T16:00:00... 部分
        let rawDate = String(titleInfo[0] || "");
        let formattedDate = rawDate.includes("T") ? rawDate.split("T")[0] : rawDate;
        document.getElementById("sheetTitle").innerText = (titleInfo[2] || "訂單查詢") + " (" + formattedDate + ")";

        // 修改2: 過濾掉「購買人」為空白的列
        queryDataRows = rows.slice(2).filter(row => {
          const name = String(row[buyerIdx] || "").trim();
          return name !== "" && name !== "0"; // 同時過濾空字串或可能出現的 0
        });

        buildBuyerDropdown();
        clearTable();
      }
    }
  } catch (e) { alert("讀取資料失敗"); } finally { showLoading(false); }
}

function buildBuyerDropdown() {
  const buyerIdx = queryHeader.indexOf("購買人");
  const set = new Set();
  queryDataRows.forEach(r => set.add(String(r[buyerIdx]).trim()));
  const select = document.getElementById("buyerSelect");
  select.innerHTML = '<option value="">--請選擇--</option><option value="ALL">全部訂單清單</option>';
  [...set].sort().forEach(v => {
    const op = document.createElement("option"); op.value = v; op.textContent = v; select.appendChild(op);
  });
}

function renderNormalTable(buyer) {
  const thead = document.querySelector("#resultTable thead"), tbody = document.querySelector("#resultTable tbody");
  thead.innerHTML = `<tr><th>購買人</th><th>項目</th><th>單價</th><th>加點</th><th>備註</th><th>數量</th><th>小計</th></tr>`;
  tbody.innerHTML = "";
  
  const idx = { user: queryHeader.indexOf("購買人"), item: queryHeader.indexOf("項目"), price: queryHeader.indexOf("單價"), rice: queryHeader.indexOf("加點"), add: queryHeader.indexOf("備註"), qty: queryHeader.indexOf("數量"), sub: queryHeader.indexOf("小計") };
  
  let filtered = (buyer === "ALL") ? queryDataRows : queryDataRows.filter(r => String(r[idx.user]).trim() === buyer);
  let totalSum = 0;

  filtered.forEach(r => {
    const subTotal = Number(r[idx.sub]) || 0;
    totalSum += subTotal;
    tbody.innerHTML += `<tr><td>${r[idx.user]}</td><td>${r[idx.item]}</td><td>${r[idx.price]}</td><td>${r[idx.rice]||""}</td><td>${r[idx.add]||""}</td><td>${r[idx.qty]}</td><td>${subTotal}</td></tr>`;
  });
  
  if (buyer !== "ALL" && filtered.length > 0) {
    tbody.innerHTML += `<tr class="total-row"><td colspan="6">個人合計</td><td>${totalSum}</td></tr>`;
  }
}

// 事件監聽與基本功能
document.getElementById("buyerSelect").addEventListener("change", (e) => {
  document.getElementById("listSelect").value = "";
  if (e.target.value) renderNormalTable(e.target.value);
});

document.getElementById("listSelect").addEventListener("change", (e) => {
  document.getElementById("buyerSelect").value = "";
  const opt = e.target.value;
  if (opt === "list1") renderList1(); else if (opt === "list2") renderList2();
});

function renderList1() {
  const idxBuyer = queryHeader.indexOf("購買人"), idxSub = queryHeader.indexOf("小計");
  const thead = document.querySelector("#resultTable thead"), tbody = document.querySelector("#resultTable tbody");
  thead.innerHTML = `<tr><th>購買人</th><th>金額總計</th></tr>`;
  const summary = {};
  queryDataRows.forEach(r => {
    const name = String(r[idxBuyer]).trim();
    summary[name] = (summary[name] || 0) + (Number(r[idxSub]) || 0);
  });
  Object.keys(summary).sort().forEach(name => {
    tbody.innerHTML += `<tr><td>${name}</td><td>${summary[name]}</td></tr>`;
  });
}

function renderList2() {
  const idxItem = queryHeader.indexOf("項目"), idxQty = queryHeader.indexOf("數量");
  const thead = document.querySelector("#resultTable thead"), tbody = document.querySelector("#resultTable tbody");
  thead.innerHTML = `<tr><th>項目</th><th>訂購數量總計</th></tr>`;
  const summary = {};
  queryDataRows.forEach(r => {
    const item = String(r[idxItem]).trim();
    summary[item] = (summary[item] || 0) + (Number(r[idxQty]) || 0);
  });
  Object.keys(summary).sort().forEach(item => {
    tbody.innerHTML += `<tr><td>${item}</td><td>${summary[item]}</td></tr>`;
  });
}

function handleExternalLink() {
  const url = "https://docs.google.com/forms/d/e/1FAIpQLScooZ_B9Jm7a2-IsEfJhwhLR7hsLyy8knIU3TKuzM7pw_Z5RQ/viewform";
  if (/Android/i.test(navigator.userAgent)) {
    window.location.href = `intent://${url.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=com.android.chrome;end`;
  } else {
    window.location.href = url + "?openExternalBrowser=1";
  }
}

function showLoading(show, text) {
  document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
  if(text) document.getElementById('loadingText').innerText = text;
}

function clearTable() {
  document.querySelector("#resultTable thead").innerHTML = "";
  document.querySelector("#resultTable tbody").innerHTML = "";
}

// 初始化選單切換
(function init(){
  const navButtons = document.querySelectorAll(".nav button");
  navButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.getElementById(btn.dataset.page).classList.add("active");
      navButtons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      if(btn.dataset.page === "queryPage") loadQueryData(true);
    });
  });
  if (/Line/i.test(navigator.userAgent)) document.getElementById('lineWarning').style.display = 'block';
})();
</script>
</body>
</html>
